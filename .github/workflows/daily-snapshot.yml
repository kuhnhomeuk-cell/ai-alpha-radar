name: Daily Snapshot

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # manual trigger button

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Poetry deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-MiniLM-L6-v2

      # Audit 4.2 — restore .batch_state.json across runs so a retry after a
      # partial failure resumes the in-flight Anthropic batch instead of
      # re-submitting it (which would double-spend). Key includes run_id so
      # every run writes a fresh entry; restore-keys falls back to the most
      # recent one by prefix. Pair with the in-process BatchCache TTL of 24h
      # so stale entries self-evict.
      - name: Restore batch idempotency state
        uses: actions/cache@v4
        with:
          path: data/.batch_state.json
          key: ${{ runner.os }}-batch-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-batch-state-

      # Spec said poetry==1.8.3; the local lockfile was generated by 2.4.1
      # and 1.8.3 rejects newer lockfile schemas. Surfaced.
      - run: pip install poetry==2.4.1

      - run: poetry install --no-interaction --no-root

      - name: Run pipeline (Claude enrichment on; 50¢ cost cap)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}
          # Wave 3a fetcher credentials — optional. Empty values cause the
          # corresponding fetcher to return [] silently; the truthfulness
          # gate (MIN_OK_SOURCES=3) still passes on arxiv/hn/github/hf alone.
          # Reddit no longer requires CLIENT_ID/SECRET — the fetcher uses
          # the public per-subreddit RSS endpoint. REDDIT_USER_AGENT is
          # kept because Reddit rate-limits aggressively on default UAs.
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
        run: poetry run python -m pipeline.run --claude --max-cost-cents 50

      - name: Commit snapshot
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add public/data.json public/snapshots/ data/predictions.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "snapshot: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no snapshot changes to commit"
          fi

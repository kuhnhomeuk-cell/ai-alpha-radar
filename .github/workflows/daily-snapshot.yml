name: Daily Snapshot

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # manual trigger button

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Poetry deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-MiniLM-L6-v2

      # Spec said poetry==1.8.3; the local lockfile was generated by 2.4.1
      # and 1.8.3 rejects newer lockfile schemas. Surfaced.
      - run: pip install poetry==2.4.1

      - run: poetry install --no-interaction --no-root

      - name: Run pipeline (no Claude; flip to --claude after prompt tuning)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          SEMANTIC_SCHOLAR_KEY: ${{ secrets.SEMANTIC_SCHOLAR_KEY }}
        run: poetry run python -m pipeline.run

      - name: Commit snapshot
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          # A successful run clears any prior stale marker.
          if [ -f public/.stale ]; then
            git rm public/.stale
          fi
          git add public/data.json public/snapshots/ data/predictions.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "snapshot: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "no snapshot changes to commit"
          fi

      - name: Mark stale on failure
        if: failure()
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          mkdir -p public
          printf '{"failed_at":"%s","reason":"daily snapshot job failed"}\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > public/.stale
          git add public/.stale
          git commit -m "chore: mark snapshot stale ($(date -u +%Y-%m-%d))"
          git push

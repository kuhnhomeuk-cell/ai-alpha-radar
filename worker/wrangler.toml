name = "ai-alpha-radar"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# RADAR_KV stores the daily spend counter for /api/deep-dive (key shape:
# `spend:{YYYY-MM-DD}` → integer cents). Without this binding `/api/deep-dive`
# crashes on its spend-tracking read.
#
# To populate the IDs below:
#   cd worker
#   ./setup_kv.sh           # runs the two `wrangler kv:namespace create` calls
# then paste the returned ids into the two PLACEHOLDER_* values.
[[kv_namespaces]]
binding = "RADAR_KV"
id = "PLACEHOLDER_RADAR_KV_ID"
preview_id = "PLACEHOLDER_RADAR_KV_PREVIEW_ID"

[vars]
# Non-secret vars. Secrets land via `wrangler secret put`.
ANTHROPIC_MODEL_HAIKU = "claude-haiku-4-5"
ANTHROPIC_MODEL_SONNET = "claude-sonnet-4-6"
DAILY_SPEND_CAP_CENTS = "30"

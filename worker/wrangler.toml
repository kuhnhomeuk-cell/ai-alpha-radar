name = "ai-alpha-radar"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# RADAR_KV stores the daily spend counter for /api/deep-dive (key shape:
# `spend:{YYYY-MM-DD}` → integer cents). Provisioned via worker/setup_kv.sh
# against the kuhnhomeuk@gmail.com Cloudflare account on 2026-05-14.
[[kv_namespaces]]
binding = "RADAR_KV"
id = "5b3f93edeaaa42b39c0446a918c9d95e"
preview_id = "4157d20b253947519d676898e68b4ca3"

[vars]
# Non-secret vars. Secrets land via `wrangler secret put`.
ANTHROPIC_MODEL_HAIKU = "claude-haiku-4-5"
ANTHROPIC_MODEL_SONNET = "claude-sonnet-4-6"
DAILY_SPEND_CAP_CENTS = "30"
